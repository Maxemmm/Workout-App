<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- PWA / iOS standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Training" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <title>Training</title>
  <!-- Typographie condensée pour les grands titres -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       VARIABLES
    ============================================================ */
    :root {
      --bg:           #0a0a0a;
      --bg-card:      #161616;
      --bg-card-soft: #1e1e1e;
      --text:         #f5f5f5;
      --text-dim:     #8a8a8a;
      --gold:         #d4a23c;
      --rust:         #c4561f;
      --blue:         #5b9bd5;
      --green-done:   #2e7d4f;
      --red-timer:    #d23a3a;
      --border:       #2a2a2a;
      /* --accent est surchargé dynamiquement par JS selon la séance */
      --accent:       var(--gold);
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
      /* Fond noir pleine largeur même sur desktop */
      background: var(--bg);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.45;
      min-height: 100dvh;
      /* Centré et contraint sur desktop, plein écran sur mobile */
      max-width: 540px;
      margin: 0 auto;
      /* Safe areas iOS */
      padding-top: env(safe-area-inset-top);
      padding-bottom: calc(env(safe-area-inset-bottom) + 72px);
      padding-left:  env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      overflow-x: hidden;
    }

    /* ============================================================
       EN-TÊTE
    ============================================================ */
    .header {
      padding: 20px 20px 0;
      /* Gradient chaud qui évoque les photos de référence */
      background: linear-gradient(172deg, #1c1308 0%, var(--bg) 58%);
    }

    .header-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .header-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .header-date {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      background: #1e1e1e;
      border: 1px solid #333;
      padding: 5px 13px;
      border-radius: 999px;
    }

    /* "AUJOURD'HUI" */
    .header-today {
      font-family: 'Oswald', -apple-system, sans-serif;
      font-size: 60px;
      font-weight: 700;
      line-height: 0.92;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 2px;
    }

    /* Nom de séance, coloré selon l'accent */
    .header-session-name {
      font-family: 'Oswald', -apple-system, sans-serif;
      font-size: 54px;
      font-weight: 700;
      line-height: 0.92;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    /* Sous-titre groupes musculaires */
    .header-subtitle {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 22px;
    }

    /* ============================================================
       ONGLETS JOURS
    ============================================================ */
    .tabs-wrapper {
      padding: 0 20px 14px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .tabs-wrapper::-webkit-scrollbar { display: none; }

    .tabs {
      display: flex;
      gap: 7px;
      width: max-content;
    }

    .tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 7px 15px;
      min-height: 44px;
      min-width: 44px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s, border-color 0.15s;
      /* Pas de style natif sur iOS */
      -webkit-appearance: none;
      appearance: none;
    }

    /* Point sous le label = jour actuel */
    .tab.is-today::after {
      content: '';
      display: block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* Onglet actif (jour affiché) */
    .tab.is-active {
      border-color: var(--accent);
      color: var(--text);
    }

    /* Jour de repos sans séance (atténué) */
    .tab.is-rest:not(.is-active) {
      color: #444;
      border-color: #1e1e1e;
    }

    /* ============================================================
       COMPTEUR DE SÉRIES
    ============================================================ */
    .sets-counter-block {
      padding: 0 20px 12px;
    }

    .sets-counter-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px;
    }

    .sets-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .sets-count {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dim);
    }
    .sets-count .sets-done-val { color: var(--accent); }

    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    /* ============================================================
       ZONE DE CONTENU (scrollable)
    ============================================================ */
    .content {
      padding: 4px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ============================================================
       BLOC ÉCHAUFFEMENT
    ============================================================ */
    .warmup-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
    }

    .section-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .warmup-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .warmup-list li {
      font-size: 13px;
      color: var(--text-dim);
      padding-left: 14px;
      position: relative;
    }
    .warmup-list li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 700;
    }

    /* ============================================================
       CARTE D'EXERCICE
    ============================================================ */
    .exercise-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      position: relative;
      transition: background 0.25s, border-color 0.25s;
    }

    .exercise-card.is-complete {
      background: #0c1f14;
      border-color: #2e7d4f;
    }

    /* Poignée de drag — bande gauche */
    .drag-handle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      flex-shrink: 0;
      color: #383838;
      font-size: 17px;
      cursor: grab;
      touch-action: none;   /* bloque le scroll iOS sur cette zone uniquement */
      user-select: none;
      -webkit-user-select: none;
      border-right: 1px solid var(--border);
      transition: color 0.15s;
    }
    .drag-handle:active { cursor: grabbing; color: var(--text-dim); }

    /* Corps de la carte */
    .card-body {
      flex: 1;
      min-width: 0;
      padding: 16px 16px 14px;
    }

    .exercise-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 4px;
    }

    .exercise-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }

    .exercise-scheme {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 1px;
    }

    /* Carte en cours de drag — fantôme en place */
    .exercise-card.is-dragging { opacity: 0.3; }

    /* Clone flottant qui suit le doigt */
    .drag-ghost {
      box-shadow: 0 14px 44px rgba(0,0,0,0.75) !important;
      transform: scale(1.015);
    }

    /* Indicateur de dépôt — box-shadow (visible même avec overflow:hidden) */
    .exercise-card.drop-before { box-shadow: 0 -5px 0 0 var(--accent); }
    .exercise-card.drop-after  { box-shadow: 0  5px 0 0 var(--accent); }

    /* Bouton swap vers une alternative */
    .btn-swap {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 10px;
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-swap:active { border-color: var(--accent); color: var(--accent); }

    /* Consigne d'exécution (champ cue) */
    .exercise-cue {
      font-size: 12px;
      font-style: italic;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    /* Rangée de cercles */
    .sets-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .set-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-dim);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .set-circle.is-checked {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    /* Barre de repos / minuteur */
    .rest-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 10px 14px;
      background: var(--bg-card-soft);
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.25s, color 0.2s;
      user-select: none;
    }

    /* Hover sur la barre idle (feedback PC) */
    .rest-bar:not(.is-running):not(.is-urgent):not(.is-done):hover {
      background: #252525;
      color: var(--text);
    }

    /* Minuteur en cours */
    .rest-bar.is-running {
      color: var(--accent);
      letter-spacing: 0.06em;
    }

    /* Moins de 10 secondes */
    .rest-bar.is-urgent {
      color: var(--red-timer) !important;
    }

    /* Fin du repos — flash bref */
    .rest-bar.is-done {
      background: var(--green-done);
      color: #fff;
      letter-spacing: 0.14em;
    }

    /* ============================================================
       BLOC CARDIO DE FIN DE SÉANCE
    ============================================================ */
    .cardio-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
    }

    .cardio-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 6px;
    }

    .cardio-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .cardio-detail {
      font-size: 13px;
      color: var(--text-dim);
    }

    /* ============================================================
       ÉCRAN REPOS / CARDIO — HERO + TIPS
    ============================================================ */
    .tips-hero {
      text-align: center;
      padding: 28px 16px 16px;
    }

    .tips-hero-icon {
      font-size: 52px;
      line-height: 1;
      margin-bottom: 14px;
    }

    .tips-hero-name {
      font-family: 'Oswald', -apple-system, sans-serif;
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .tips-hero-sub {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .tip-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
    }

    .tip-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 5px;
    }

    .tip-body {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.55;
    }

    /* ============================================================
       CHAMP POIDS PAR EXERCICE
    ============================================================ */
    .weight-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 13px;
    }

    .weight-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .weight-input-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--bg-card-soft);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
    }

    /* font-size 16px : empêche le zoom automatique sur iOS */
    .weight-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      width: 60px;
      text-align: right;
      -moz-appearance: textfield;
    }
    .weight-input::-webkit-outer-spin-button,
    .weight-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .weight-input::placeholder { color: #444; font-weight: 400; }

    .weight-unit {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .weight-hint {
      font-size: 11px;
      color: #3a3a3a;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ============================================================
       BOUTON RÉINITIALISER
    ============================================================ */
    .reset-row {
      padding: 4px 0 2px;
      text-align: right;
    }

    .btn-reset {
      background: transparent;
      border: none;
      color: #444;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 6px 2px;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .btn-reset:active { color: var(--rust); }

    /* ============================================================
       BOUTON TERMINER LA SÉANCE
    ============================================================ */
    .btn-finish-session {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 2px solid #2a2a2a;
      background: transparent;
      color: var(--text-dim);
      font-family: 'Oswald', -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transform: translateZ(0);
      will-change: opacity, transform;
      position: relative;
      overflow: hidden;
      text-align: center;
      /* cubic-bezier standard Material : accélération naturelle */
      transition: background  0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  border-color 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  color        0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity      0.3s  ease;
    }
    .btn-finish-session:disabled {
      cursor: default;
    }
    .btn-finish-session.is-all-done {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-finish-session.is-logged {
      background: var(--green-done);
      border-color: var(--green-done);
      color: #fff;
    }
    .btn-finish-session:not(.is-logged):active { opacity: 0.6; }

    /* ── Animations du bouton "Terminer la séance" ───────────────── */
    /* État neutre forcé (anti-flash vert pendant le fade-in) */
    .btn-finish-session.is-resetting {
      transition: none !important;
      background: transparent !important;
      border-color: #2a2a2a !important;
      color: var(--text-dim) !important;
    }

    .btn-finish-session .finish-label {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }
    .btn-finish-session .finish-label-main {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 180ms ease, transform 220ms ease;
    }
    .btn-finish-session .finish-label-success {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 220ms ease, transform 260ms ease;
    }
    .btn-finish-session.is-success .finish-label-main {
      opacity: 0;
      transform: translateY(-6px);
    }
    .btn-finish-session.is-success .finish-label-success {
      opacity: 1;
      transform: translateY(0);
    }
    /* Gèle les transitions de labels (anti-flicker iOS) */
    .btn-finish-session.labels-freeze .finish-label-main,
    .btn-finish-session.labels-freeze .finish-label-success {
      transition: none !important;
    }

    @keyframes finishSuccess {
      0%   { transform: translateZ(0) scale(1); }
      18%  { transform: translateZ(0) scale(1.03); }
      50%  { transform: translateZ(0) scale(1.00); }
      100% { transform: translateZ(0) scale(1.00); }
    }
    @keyframes finishFadeOut {
      from { opacity: 1; transform: translateZ(0) translateY(0); }
      to   { opacity: 0; transform: translateZ(0) translateY(6px); }
    }
    @keyframes finishFadeIn {
      from { opacity: 0; transform: translateZ(0) translateY(6px); }
      to   { opacity: 1; transform: translateZ(0) translateY(0); }
    }
    .btn-finish-session.anim-success {
      animation: finishSuccess 600ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
    }
    .btn-finish-session.anim-fadeout {
      animation: finishFadeOut 240ms ease both;
    }
    .btn-finish-session.anim-fadein {
      animation: finishFadeIn 260ms ease both;
    }
    @media (prefers-reduced-motion: reduce) {
      .btn-finish-session.anim-success,
      .btn-finish-session.anim-fadeout,
      .btn-finish-session.anim-fadein {
        animation: none !important;
      }
      .btn-finish-session .finish-label-main,
      .btn-finish-session .finish-label-success {
        transition: none !important;
      }
    }

    /* ============================================================
       NAVIGATION BAS (écrans Séance / Stats)
    ============================================================ */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 540px;
      display: flex;
      background: #111;
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 200;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 0 12px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s;
      font-family: inherit;
    }
    .nav-btn.is-active { color: var(--gold); }
    .nav-icon { font-size: 20px; line-height: 1; }
    .nav-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ============================================================
       ÉCRAN STATS — EN-TÊTE
    ============================================================ */
    .stats-hdr {
      padding: 20px 20px 0;           /* identique à .header */
      background: linear-gradient(172deg, #1c1308 0%, var(--bg) 58%);
    }
    .stats-hdr-title {
      font-family: 'Oswald', -apple-system, sans-serif;
      font-size: 54px;
      font-weight: 700;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: var(--gold);
      line-height: 0.92;
      margin-bottom: 22px;            /* identique à .header-subtitle margin-bottom */
    }

    /* ── Sub-nav Résumé / Par exercice ── */
    .stats-subnav {
      display: flex;
      gap: 8px;
      padding: 0 20px 14px;           /* identique à .tabs-wrapper */
    }
    .stats-tab {
      padding: 8px 18px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }
    .stats-tab.is-active { border-color: var(--gold); color: var(--text); }

    /* ── Zone scrollable des vues stats ── */
    .stats-view {
      padding: 4px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Ligne double : deux cartes côte à côte ── */
    .stat-row {
      display: flex;
      gap: 10px;
    }
    .stat-row > .stat-card { flex: 1; min-width: 0; }
    .stat-row .stat-big    { font-size: 28px; }
    .stat-row .stat-sub    { font-size: 11px; }

    /* ============================================================
       CARTES DE MÉTRIQUES
    ============================================================ */
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
    }
    .stat-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .stat-big {
      font-family: 'Oswald', -apple-system, sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-sub {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ── Boutons Export / Import ── */
    .stats-actions {
      display: flex;
      gap: 10px;
    }
    .btn-action-stats {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      text-align: center;
      display: block;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-action-stats:hover,
    .btn-action-stats:active { border-color: var(--gold); color: var(--gold); }

    .btn-action-danger {
      width: 100%;
      border-color: #3a1a10;
      color: #6b2a10;
    }
    .btn-action-danger:hover,
    .btn-action-danger:active {
      border-color: var(--rust);
      color: var(--rust);
      background: rgba(196,86,31,0.08);
    }

    /* ── Sélecteur d'exercice ── */
    .exercise-select {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      font-weight: 600;
      -webkit-appearance: none;
      appearance: none;
      outline: none;
      cursor: pointer;
    }

    /* ── Conteneur du chart ── */
    .chart-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    /* ── Liste historique par exercice ── */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .history-item.is-pr { border-color: #3a2e10; }
    .history-date  { font-size: 11px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.05em; }
    .history-weight { font-size: 17px; font-weight: 700; color: var(--text); }
    .history-item.is-pr .history-weight { color: var(--gold); }
    .history-vol   { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }

    /* ── Message vide ── */
    .no-data {
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
      padding: 28px 0;
    }

    /* ── Toast de confirmation « Séance enregistrée » ── */
    .finish-toast {
      position: fixed;
      bottom: 76px; /* au-dessus de la bottom nav */
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--green-done);
      color: #fff;
      font-family: 'Oswald', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px 28px;
      border-radius: 12px;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 300;
      pointer-events: none;
      white-space: nowrap;
    }
    .finish-toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>

  <div id="screen-workout">

      <span class="nav-label">STATS</span>
    </button>

  <!-- ============================================================
       DONNÉES DU PROGRAMME
  ============================================================ -->
  <script src="program.js"></script>

  <!-- ============================================================
       MOTEUR — LOGIQUE GÉNÉRIQUE
       Aucune valeur de jour, séance, exercice ou couleur en dur.
       Tout est dérivé de PROGRAM.
  ============================================================ -->
  <script>
    /* ── Constantes UI ─────────────────────────────────────────────── */
    const JOURS_ABBR = ['DIM', 'LUN', 'MAR', 'MER', 'JEU', 'VEN', 'SAM'];
    const MOIS_ABBR  = ['JAN', 'FÉV', 'MAR', 'AVR', 'MAI', 'JUN',
                        'JUL', 'AOÛ', 'SEP', 'OCT', 'NOV', 'DÉC'];

    /* Mappe la clé d'accent → variable CSS */
    const ACCENT_MAP = {
      gold: 'var(--gold)',
      rust: 'var(--rust)',
      blue: 'var(--blue)',
      gray: 'var(--text-dim)',
    };

    /* Icônes selon type de séance */
    const TYPE_ICON = {
      cardio: '🚴',
      rest:   '🌿',
    };

    /* ── Séance repos implicite (jours non définis dans schedule) ──── */
    const REPOS_IMPLICITE = {
      key:      '__repos__',
      type:     'rest',
      name:     'REPOS',
      accent:   'gray',
      subtitle: 'RÉCUPÈRE. MANGE. DORS.',
      tips: [
        {
          title: "Le sommeil est de l'entraînement",
          body:  "7 à 9 h — pic d'hormone de croissance. C'est là que le muscle se construit vraiment.",
        },
        {
          title: "Protéines",
          body:  "Ne pas baisser l'apport les jours de repos. La réparation musculaire continue 24 h/24.",
        },
        {
          title: "Hydratation",
          body:  "Boire au moins 2 L d'eau. L'eau transporte les nutriments vers les muscles.",
        },
      ],
    };

    /* ── État en mémoire ───────────────────────────────────────────── */
    // Séries cochées : { [sessionKey]: { [exerciseId]: boolean[] } }
    const etatSeries = {};

    /* ── Persistance localStorage ──────────────────────────────────── */

    // Date ISO (YYYY-MM-DD) du dayIndex dans la semaine courante
    function dateForDay(dayIndex) {
      const d = new Date(AUJOURD_HUI);
      d.setDate(AUJOURD_HUI.getDate() + (dayIndex - JOUR_COURANT));
      return d.toISOString().slice(0, 10);
    }

    function loadTrack(dayIndex, sessionKey) {
      try {
        const raw = localStorage.getItem(`track:${dateForDay(dayIndex)}:${sessionKey}`);
        return raw ? JSON.parse(raw) : {};
      } catch (_) { return {}; }
    }

    function saveTrack(dayIndex, sessionKey, state) {
      try {
        localStorage.setItem(
          `track:${dateForDay(dayIndex)}:${sessionKey}`,
          JSON.stringify(state)
        );
      } catch (_) {}
    }

    function clearTrack(dayIndex, sessionKey) {
      try {
        localStorage.removeItem(`track:${dateForDay(dayIndex)}:${sessionKey}`);
      } catch (_) {}
    }

    function loadWeight(exId) {
      try { return localStorage.getItem(`weight:${exId}`) || ''; }
      catch (_) { return ''; }
    }

    function saveWeight(exId, value) {
      try {
        if (value !== '' && value != null) localStorage.setItem(`weight:${exId}`, value);
        else localStorage.removeItem(`weight:${exId}`);
      } catch (_) {}
    }

    function loadLayout(sessionKey) {
      try {
        const raw = localStorage.getItem(`layout:${sessionKey}`);
        return raw ? JSON.parse(raw) : { order: [], swaps: {} };
      } catch (_) { return { order: [], swaps: {} }; }
    }

    function saveLayout(sessionKey, layout) {
      try {
        localStorage.setItem(`layout:${sessionKey}`, JSON.stringify(layout));
      } catch (_) {}
    }

    // Retourne les exercices réordonnés + noms swappés (ne mute pas session.exercises)
    function applyLayout(exercises, layout) {
      let ordered = [...exercises];

      if (layout.order?.length) {
        const pos = Object.fromEntries(layout.order.map((id, i) => [id, i]));
        ordered.sort((a, b) => (pos[a.id] ?? 999) - (pos[b.id] ?? 999));
      }

      return ordered.map(ex => {
        const swapIdx = layout.swaps?.[ex.id] ?? 0;
        const altName = swapIdx > 0 ? ex.alternatives?.[swapIdx - 1] : null;
        return { ...ex, _displayName: altName ?? ex.name, _swapIdx: swapIdx };
      });
    }

    /* ── Date et jour courant ──────────────────────────────────────── */
    const AUJOURD_HUI  = new Date();
    const JOUR_COURANT = AUJOURD_HUI.getDay(); // 0 = dimanche
    let   jourActif    = JOUR_COURANT;

    /* ── Utilitaires ───────────────────────────────────────────────── */

    // Retourne la séance pour un indice de jour (0-6)
    function getSession(dayIndex) {
      const key = PROGRAM.schedule[dayIndex];
      if (!key) return REPOS_IMPLICITE;
      const s = PROGRAM.sessions[key];
      return s ? { key, ...s } : REPOS_IMPLICITE;
    }

    // Chaîne CSS de la couleur d'accent d'une séance
    function accentCSS(session) {
      return ACCENT_MAP[session.accent] || 'var(--gold)';
    }

    // Nombre total de séries d'une séance lift
    function totalSets(session) {
      if (!session.exercises) return 0;
      return session.exercises.reduce((n, ex) => n + ex.sets, 0);
    }

    // Nombre de séries cochées pour une clé de séance
    function doneSets(sessionKey) {
      const state = etatSeries[sessionKey];
      if (!state) return 0;
      return Object.values(state)
        .reduce((n, arr) => n + arr.filter(Boolean).length, 0);
    }

    // Formatte une durée en secondes → "2 min", "1 min 30", "45 s"
    function fmtRest(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      if (m === 0) return `${s} s`;
      if (s === 0) return `${m} min`;
      return `${m} min ${s}`;
    }

    // Formatte la date du jour → "JEU, 28 MAI"
    function fmtDate(d) {
      return `${JOURS_ABBR[d.getDay()]}, ${d.getDate()} ${MOIS_ABBR[d.getMonth()]}`;
    }

    /* ── Rendu principal ───────────────────────────────────────────── */

    function render(dayIndex) {
      stopTimer();   // annule le timer avant de détruire le DOM
      cancelDrag();  // nettoie le ghost si un drag est en cours
      finishBtnEl = null;
      jourActif = dayIndex;
      const session = getSession(dayIndex);

      // Mise à jour de la variable CSS --accent
      document.documentElement.style.setProperty('--accent', accentCSS(session));

      // En-tête
      document.getElementById('hdr-today').textContent        = 'AUJOURD\'HUI';
      document.getElementById('hdr-session-name').textContent = session.name;
      document.getElementById('hdr-subtitle').textContent     = session.subtitle || '';

      // Onglets
      renderTabs(dayIndex);

      // Compteur séries
      const isLift = session.type === 'lift' || session.type === 'mixed';
      renderCounter(session, isLift);

      // Contenu
      const content = document.getElementById('content');
      content.innerHTML = '';

      if (isLift) {
        renderLift(session, content);
      } else {
        renderTips(session, content);
      }
    }

    /* ── Onglets ───────────────────────────────────────────────────── */

    function renderTabs(activeDayIndex) {
      const container = document.getElementById('tabs');
      container.innerHTML = '';

      // Ordre d'affichage : lundi → dimanche
      const ORDER_JOURS = [1, 2, 3, 4, 5, 6, 0];
      ORDER_JOURS.forEach(i => {
        const session   = getSession(i);
        const isRest    = session.type === 'rest';
        const isActive  = i === activeDayIndex;
        const isToday   = i === JOUR_COURANT;

        const btn = document.createElement('button');
        btn.role = 'tab';
        btn.setAttribute('aria-selected', isActive);
        btn.className = 'tab'
          + (isActive  ? ' is-active' : '')
          + (isToday   ? ' is-today'  : '')
          + (isRest && !isActive ? ' is-rest' : '');
        btn.textContent = JOURS_ABBR[i];
        btn.addEventListener('click', () => render(i));
        container.appendChild(btn);
      });
    }

    /* ── Compteur de séries ────────────────────────────────────────── */

    function renderCounter(session, visible) {
      const block = document.getElementById('sets-counter-block');
      block.style.display = visible ? '' : 'none';
      if (!visible) return;

      const total = totalSets(session);
      const done  = doneSets(session.key);
      document.getElementById('sets-done').textContent  = done;
      document.getElementById('sets-total').textContent = total;
      const pct = total > 0 ? (done / total) * 100 : 0;
      document.getElementById('progress-fill').style.width = pct + '%';

      if (finishBtnEl && !finishBtnEl.classList.contains('is-logged')) {
        const allDone = total > 0 && done >= total;
        finishBtnEl.classList.toggle('is-all-done', allDone);
        setFinishButtonMainText(finishBtnEl, allDone ? '✓ TERMINER LA SÉANCE' : 'TERMINER LA SÉANCE');
      }
    }

    /* ── Réinitialisation de la séance du jour ─────────────────────── */

    function resetJour() {
      const session = getSession(jourActif);
      clearTrack(jourActif, session.key);
      delete etatSeries[session.key];
      stopTimer();
      render(jourActif);
    }

    /* ── Rendu d'une séance de musculation ─────────────────────────── */

    function renderLift(session, container) {
      // Échauffement
      if (session.warmup && session.warmup.length) {
        const card = document.createElement('div');
        card.className = 'warmup-card';
        card.innerHTML =
          `<div class="section-label">Échauffement</div>` +
          `<ul class="warmup-list">` +
          session.warmup.map(w => `<li>${w}</li>`).join('') +
          `</ul>`;
        container.appendChild(card);
      }

      // Exercices — layout + état chargés depuis localStorage
      const layout    = loadLayout(session.key);
      const exercises = applyLayout(session.exercises || [], layout);
      const savedTrack = loadTrack(jourActif, session.key);
      const state = (etatSeries[session.key] = {});
      exercises.forEach((ex, idx) => {
        const saved = savedTrack[ex.id];
        state[ex.id] = Array.isArray(saved) && saved.length === ex.sets
          ? [...saved]
          : new Array(ex.sets).fill(false);
        container.appendChild(buildExerciseCard(session, ex, state[ex.id], layout, exercises, idx));
      });

      // Cardio de fin
      if (session.cardio) {
        const card = document.createElement('div');
        card.className = 'cardio-card';
        card.innerHTML =
          `<div class="cardio-label">Cardio fin de séance</div>` +
          `<div class="cardio-name">${session.cardio.label}</div>` +
          `<div class="cardio-detail">${session.cardio.detail}</div>`;
        container.appendChild(card);
      }

      // Bloc bonus
      if (session.bonus) {
        const bonusKey   = session.key + '__bonus';
        const savedBonus = loadTrack(jourActif, bonusKey);
        const bonusState = (etatSeries[bonusKey] = {});
        const wrapper = document.createElement('div');
        wrapper.className = 'warmup-card';
        wrapper.innerHTML = `<div class="section-label">Bonus — ${session.bonus.title}</div>`;
        (session.bonus.exercises || []).forEach(ex => {
          const saved = savedBonus[ex.id];
          bonusState[ex.id] = Array.isArray(saved) && saved.length === ex.sets
            ? [...saved]
            : new Array(ex.sets).fill(false);
          wrapper.appendChild(buildExerciseCard(session, ex, bonusState[ex.id], { order: [], swaps: {} }, [ex], 0));
        });
        container.appendChild(wrapper);
      }

      // Bouton reset
      document.getElementById('btn-reset').onclick = resetJour;

      // Bouton Terminer la séance
      const finishBtn = document.createElement('button');
      finishBtn.className = 'btn-finish-session';
      const initAllDone = totalSets(session) > 0 && doneSets(session.key) >= totalSets(session);
      finishBtn.classList.toggle('is-all-done', initAllDone);
      finishBtn.innerHTML =
        `<span class="finish-label finish-label-main"></span>` +
        `<span class="finish-label finish-label-success">✓ SÉANCE ENREGISTRÉE</span>`;
      setFinishButtonMainText(finishBtn, initAllDone ? '✓ TERMINER LA SÉANCE' : 'TERMINER LA SÉANCE');
      finishBtnEl = finishBtn;

      finishBtn.addEventListener('click', () => {
        if (finishBtn.disabled) return;

        // Guard d'abord : empêche le double-clic
        finishBtn.classList.add('is-logged');
        finishBtn.disabled = true;

        // 1. Log (etatSeries encore à jour, avant tout reset)
        const allDone = totalSets(session) > 0 && doneSets(session.key) >= totalSets(session);
        logSession(allDone);

        // 2. Reset persistence + mémoire
        clearTrack(jourActif, session.key);
        stopTimer();
        const st = etatSeries[session.key];
        if (st) Object.values(st).forEach(arr => arr.fill(false));

        // 3. Reset DOM direct (sans re-render complet)
        document.querySelectorAll('#content .set-circle').forEach(el =>
          el.classList.remove('is-checked')
        );
        document.querySelectorAll('#content .exercise-card').forEach(el =>
          el.classList.remove('is-complete')
        );
        renderCounter(session, true);

        // 4. Animation fluide (sans toast externe)
        runFinishButtonAnimation(finishBtn);
      });

      container.appendChild(finishBtn);
    }

    /* ── Minuteur de repos ─────────────────────────────────────────── */

    let timerInterval = null;
    let timerBarEl    = null;
    let timerRestSec  = 0;
    let finishBtnEl   = null;

    // AudioContext partagé — créé au premier geste, réutilisé ensuite.
    // Évite le blocage "autoplay policy" de Chrome/Safari sur PC.
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch (_) { return null; }
      }
      // Reprend si le navigateur l'a suspendu (tab en arrière-plan, etc.)
      if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
      return audioCtx;
    }

    function fmtCountdown(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      if (timerBarEl) {
        timerBarEl.classList.remove('is-running', 'is-urgent', 'is-done');
        timerBarEl.textContent = `⏱ REPOS ${fmtRest(timerRestSec).toUpperCase()}`;
        timerBarEl = null;
      }
    }

    function startTimer(barEl, restSec) {
      stopTimer();
      timerBarEl   = barEl;
      timerRestSec = restSec;
      let remaining = restSec;

      // Warm-up AudioContext pendant le geste utilisateur qui déclenche le timer
      getAudioCtx();

      function tick() {
        if (!timerBarEl) return;
        if (remaining <= 0) {
          clearInterval(timerInterval); timerInterval = null;
          timerDone(); return;
        }
        timerBarEl.classList.add('is-running');
        timerBarEl.classList.toggle('is-urgent', remaining <= 10);
        timerBarEl.textContent = `⏱ ${fmtCountdown(remaining)}`;
        remaining--;
      }

      tick();
      timerInterval = setInterval(tick, 1000);
    }

    function timerDone() {
      if (!timerBarEl) return;
      const barEl = timerBarEl;
      timerBarEl  = null;
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      beepFin();

      barEl.classList.remove('is-running', 'is-urgent');
      barEl.classList.add('is-done');
      barEl.textContent = '✓ C\'EST PARTI !';

      setTimeout(() => {
        barEl.classList.remove('is-done');
        barEl.textContent = `⏱ REPOS ${fmtRest(timerRestSec).toUpperCase()}`;
      }, 2500);
    }

    function beepFin() {
      const ctx = getAudioCtx();
      if (!ctx) return;
      try {
        [[0, 660], [0.25, 880]].forEach(([offset, freq]) => {
          const osc  = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.35, ctx.currentTime + offset);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.22);
          osc.start(ctx.currentTime + offset);
          osc.stop(ctx.currentTime + offset + 0.25);
        });
      } catch (_) {}
    }

    /* ── Parsing reps depuis le scheme ─────────────────────────────── */

    // "4×8" → 8   |   "3×45 sec" / "3×MAX" → null
    function parseReps(scheme) {
      const m = scheme.match(/[×x](\d+)$/);
      return m ? parseInt(m[1], 10) : null;
    }

    // Extrait un poids depuis ex.load (poids de base du programme)
    // "100 à 120 kg" -> 100  |  "10 kg" -> 10  |  "assistance 21 kg" -> 21
    function parseSuggestedWeight(load) {
      if (!load) return null;
      const m = String(load).match(/(\d+(?:[.,]\d+)?)/);
      if (!m) return null;
      return parseFloat(m[1].replace(',', '.'));
    }

    /* ── Toast de confirmation ──────────────────────────────────────── */

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'finish-toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('is-visible'));
      setTimeout(() => {
        toast.classList.remove('is-visible');
        setTimeout(() => toast.remove(), 300);
      }, 2200);
    }

    /* ── Animation du bouton "Terminer la séance" ───────────────────── */

    function setFinishButtonMainText(btn, text) {
      const el = btn?.querySelector?.('.finish-label-main');
      if (el) el.textContent = text;
      else if (btn) btn.textContent = text; // fallback sécurité
    }

    function runFinishButtonAnimation(btn) {
      if (!btn || !document.contains(btn)) return;

      // Nettoyage (si un état précédent a été interrompu par un re-render)
      btn.classList.remove('anim-success', 'anim-fadeout', 'anim-fadein');
      btn.classList.remove('is-success');
      btn.classList.remove('labels-freeze');
      btn.classList.remove('is-resetting');

      const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduceMotion) {
        // Pas d'animation : reset rapide mais lisible.
        setTimeout(() => {
          if (!document.contains(btn)) return;
          btn.classList.add('is-success');
          setTimeout(() => {
            if (!document.contains(btn)) return;
            btn.classList.remove('is-success', 'is-logged', 'is-all-done');
            setFinishButtonMainText(btn, 'TERMINER LA SÉANCE');
            btn.disabled = false;
          }, 350);
          btn.disabled = false;
        }, 350);
        return;
      }

      // Phase 1 : petit "pop" de confirmation
      btn.classList.add('anim-success');
      btn.classList.add('is-success');

      const onSuccessEnd = (e) => {
        if (e.target !== btn) return;
        btn.removeEventListener('animationend', onSuccessEnd);
        if (!document.contains(btn)) return;

        btn.classList.remove('anim-success');
        // Laisser "SÉANCE ENREGISTRÉE" visible un court instant,
        // puis fondu de tout le bouton.
        setTimeout(() => {
          if (!document.contains(btn)) return;
          btn.classList.add('anim-fadeout');

          const onFadeOutEnd = (e2) => {
            if (e2.target !== btn) return;
            btn.removeEventListener('animationend', onFadeOutEnd);
            if (!document.contains(btn)) return;

            // Swap invisible (btn est opacity:0 à la fin de fadeout)
            // 1) Gèle 1 frame les transitions internes (évite le "flash" du label success)
            btn.classList.add('labels-freeze');
            // 2) Force l'état visuel neutre (évite un flash vert sur iOS)
            btn.classList.add('is-resetting');
            // 3) Reset des états (toujours invisible)
            btn.classList.remove('is-success', 'is-logged', 'is-all-done', 'anim-fadeout');
            setFinishButtonMainText(btn, 'TERMINER LA SÉANCE');

            // 4) Force un reflow avant le fade-in (Safari peut rejouer l'ancien style sinon)
            void btn.offsetWidth;

            // 5) Fade-in vers l'état neutre (au prochain frame)
            requestAnimationFrame(() => {
              if (!document.contains(btn)) return;
              btn.classList.add('anim-fadein');
              // On dégèle après le paint du nouveau state
              requestAnimationFrame(() => {
                if (!document.contains(btn)) return;
                btn.classList.remove('labels-freeze');
              });
            });

            const onFadeInEnd = (e3) => {
              if (e3.target !== btn) return;
              btn.removeEventListener('animationend', onFadeInEnd);
              if (!document.contains(btn)) return;

              btn.classList.remove('anim-fadein');
              btn.classList.remove('is-resetting');
              btn.disabled = false;
            };
            btn.addEventListener('animationend', onFadeInEnd);
          };
          btn.addEventListener('animationend', onFadeOutEnd);
        }, 650);
      };
      btn.addEventListener('animationend', onSuccessEnd);
    }

    /* ── Log de séance (clé "log:YYYY-MM-DD") ──────────────────────── */

    function logSession(completed) {
      const session = getSession(jourActif);
      if (!session.exercises) return null;

      const date  = dateForDay(jourActif);
      const state = etatSeries[session.key] || {};

      const exercises = (session.exercises || []).map(ex => ({
        id:     ex.id,
        // Poids : toujours depuis localStorage (semé au 1er rendu avec la valeur du programme)
        weight: parseFloat(loadWeight(ex.id)) || 0,
        sets:   (state[ex.id] || []).filter(Boolean).length,
        reps:   parseReps(ex.scheme),
      }));

      const entry = { date, session: session.key, completed, exercises };
      try { localStorage.setItem(`log:${date}`, JSON.stringify(entry)); } catch (_) {}
      return entry;
    }

    /* ── Drag-and-drop ─────────────────────────────────────────────── */

    let drag = null;

    function getDragCards() {
      return [...document.querySelectorAll(
        '.exercise-card[data-sortable]:not(.is-dragging):not(.drag-ghost)'
      )];
    }

    // Annule proprement un drag en cours sans re-render (appelé par render())
    function cancelDrag() {
      if (!drag) return;
      try { drag.ghost.remove(); } catch (_) {}
      document.body.style.cursor = '';
      drag = null;
    }

    function onDragMove(e) {
      if (!drag) return;
      const dy = e.clientY - drag.startY;
      drag.ghost.style.top = (drag.startTop + dy) + 'px';

      const ghostMid = drag.startTop + dy + drag.cardH / 2;
      const cards = getDragCards();
      cards.forEach(c => c.classList.remove('drop-before', 'drop-after'));

      let insertAt = cards.length;
      for (let i = 0; i < cards.length; i++) {
        const r = cards[i].getBoundingClientRect();
        if (ghostMid < r.top + r.height / 2) { insertAt = i; break; }
      }

      if (insertAt < cards.length) cards[insertAt].classList.add('drop-before');
      else if (cards.length)       cards[cards.length - 1].classList.add('drop-after');

      drag.insertAt = insertAt;
    }

    function onDragEnd() {
      if (!drag) return;
      const { card, ghost, session, allExercises, fromIdx, insertAt } = drag;

      ghost.remove();
      card.classList.remove('is-dragging');
      getDragCards().forEach(c => c.classList.remove('drop-before', 'drop-after'));
      document.body.style.cursor = '';
      drag = null;

      if (insertAt == null) return;

      const ids = allExercises.map(ex => ex.id);
      const [moved] = ids.splice(fromIdx, 1);
      ids.splice(insertAt > fromIdx ? insertAt - 1 : insertAt, 0, moved);

      const orig = allExercises.map(ex => ex.id);
      if (ids.every((id, i) => id === orig[i])) return;

      const l = loadLayout(session.key);
      l.order = ids;
      saveLayout(session.key, l);
      render(jourActif);
    }

    function initDrag(handle, card, session, allExercises, fromIdx) {
      handle.addEventListener('pointerdown', (e) => {
        if (e.button !== 0) return;
        e.preventDefault();

        // Pointer capture : redirige tous les événements vers handle même hors de son aire
        try { handle.setPointerCapture(e.pointerId); } catch (_) {}

        const rect = card.getBoundingClientRect();
        const ghost = card.cloneNode(true);
        ghost.classList.add('drag-ghost');
        Object.assign(ghost.style, {
          position: 'fixed', top: rect.top + 'px', left: rect.left + 'px',
          width: rect.width + 'px', zIndex: '1000', pointerEvents: 'none',
          borderRadius: '16px', opacity: '0.93',
        });
        document.body.appendChild(ghost);
        card.classList.add('is-dragging');
        document.body.style.cursor = 'grabbing';

        drag = { card, ghost, session, allExercises, fromIdx,
          startY: e.clientY, startTop: rect.top, cardH: rect.height, insertAt: null };

        // Listeners document — fiabilité maximale souris PC et tactile
        document.addEventListener('pointermove',   handleMove);
        document.addEventListener('pointerup',     handleEnd);
        document.addEventListener('pointercancel', handleEnd);
      });

      // handleMove / handleEnd : fonctions nommées pour pouvoir les supprimer
      function handleMove(e) {
        if (!drag || drag.card !== card) return;
        onDragMove(e);
      }

      function handleEnd() {
        if (!drag || drag.card !== card) return;
        // Suppression des listeners document + lostpointercapture est idempotente
        document.removeEventListener('pointermove',   handleMove);
        document.removeEventListener('pointerup',     handleEnd);
        document.removeEventListener('pointercancel', handleEnd);
        onDragEnd();
      }

      // Second chemin de sortie via pointer capture (complémentaire)
      handle.addEventListener('lostpointercapture', handleEnd);
    }

    /* ── Construction d'une carte exercice ─────────────────────────── */

    function buildExerciseCard(session, ex, checked, layout, allExercises, idx) {
      const card = document.createElement('div');
      card.className = 'exercise-card' + (checked.every(Boolean) ? ' is-complete' : '');
      if (allExercises.length > 1) card.dataset.sortable = '';

      const restSec    = ex.restSec ?? PROGRAM.meta.restDefaultSec;
      const restText   = fmtRest(restSec);
      const units      = PROGRAM.meta.units;
      const savedPoids = loadWeight(ex.id);
      const poidsBase  = parseSuggestedWeight(ex.load);
      const poidsVal   = savedPoids !== ''
        ? savedPoids
        : (poidsBase != null ? String(poidsBase) : '');
      const showWeight = /\d/.test(ex.load ?? '') || savedPoids !== '';
      const hasAlts    = (ex.alternatives?.length ?? 0) > 0;
      const curSwap    = ex._swapIdx ?? 0;
      const nextSwap   = (curSwap + 1) % ((ex.alternatives?.length ?? 0) + 1);
      const nextLabel  = nextSwap === 0 ? ex.name : (ex.alternatives?.[nextSwap - 1] ?? '');

      // Si aucun poids n'a encore été saisi, on "sème" le poids de base du programme
      // pour que les logs et le dashboard (volume) reflètent tes poids actuels.
      if (savedPoids === '' && poidsVal !== '') {
        saveWeight(ex.id, poidsVal);
      }

      card.innerHTML =
        // Poignée de drag (toujours présente, inactive si 1 seul exercice)
        `<div class="drag-handle" aria-label="Déplacer">⠿</div>` +
        `<div class="card-body">` +
          `<div class="exercise-header">` +
            `<div class="exercise-name">${ex._displayName ?? ex.name}</div>` +
            `<div class="exercise-scheme">${ex.scheme}</div>` +
          `</div>` +
          (ex.cue ? `<div class="exercise-cue">${ex.cue}</div>` : '') +
          (hasAlts ? `<button class="btn-swap">⇄ ${nextLabel}</button>` : '') +
          (showWeight
            ? `<div class="weight-row">` +
                `<span class="weight-label">Poids</span>` +
                `<div class="weight-input-wrap">` +
                  `<input class="weight-input" type="number" inputmode="decimal"` +
                  ` min="0" step="0.5" placeholder="--" value="${poidsVal}" />` +
                  `<span class="weight-unit">${units}</span>` +
                `</div>` +
                (ex.load ? `<span class="weight-hint">sugg. ${ex.load}</span>` : '') +
              `</div>`
            : '') +
          `<div class="sets-row">` +
            checked.map((done, i) =>
              `<div class="set-circle${done ? ' is-checked' : ''}" data-idx="${i}">${i + 1}</div>`
            ).join('') +
          `</div>` +
          `<div class="rest-bar" title="Appuyer pour annuler">⏱ REPOS ${restText.toUpperCase()}</div>` +
        `</div>`;

      // Drag
      if (allExercises.length > 1) {
        initDrag(card.querySelector('.drag-handle'), card, session, allExercises, idx);
      }

      // Poids
      const input = card.querySelector('.weight-input');
      if (input) input.addEventListener('change', () => saveWeight(ex.id, input.value.trim()));

      // Barre de repos
      const restBar = card.querySelector('.rest-bar');
      restBar.addEventListener('click', () => {
        if (timerBarEl === restBar) stopTimer();   // timer actif → annuler
        else startTimer(restBar, restSec);         // timer inactif → démarrer
      });

      // Swap
      card.querySelector('.btn-swap')?.addEventListener('click', () => {
        const l = loadLayout(session.key);
        l.swaps = l.swaps || {};
        if (nextSwap === 0) delete l.swaps[ex.id];
        else l.swaps[ex.id] = nextSwap;
        saveLayout(session.key, l); render(jourActif);
      });

      // Cercles
      card.querySelectorAll('.set-circle').forEach(circle => {
        circle.addEventListener('click', () => {
          const setIdx    = parseInt(circle.dataset.idx, 10);
          checked[setIdx] = !checked[setIdx];
          circle.classList.toggle('is-checked', checked[setIdx]);
          card.classList.toggle('is-complete', checked.every(Boolean));
          if (checked[setIdx]) startTimer(restBar, restSec);
          saveTrack(jourActif, session.key, etatSeries[session.key]);
          renderCounter(getSession(jourActif), true);
        });
      });

      return card;
    }

    /* ── Rendu d'un écran repos / cardio (tips) ────────────────────── */

    function renderTips(session, container) {
      const icon = TYPE_ICON[session.type] || '💤';

      // Hero
      const hero = document.createElement('div');
      hero.className = 'tips-hero';
      hero.innerHTML =
        `<div class="tips-hero-icon">${icon}</div>` +
        `<div class="tips-hero-name">${session.name}</div>` +
        `<div class="tips-hero-sub">${session.subtitle || ''}</div>`;
      container.appendChild(hero);

      // Cartes de conseils
      (session.tips || []).forEach(tip => {
        const card = document.createElement('div');
        card.className = 'tip-card';
        card.innerHTML =
          `<div class="tip-title">${tip.title}</div>` +
          `<div class="tip-body">${tip.body}</div>`;
        container.appendChild(card);
      });
    }

    /* ── Initialisation ────────────────────────────────────────────── */

    // Date du jour dans les deux bandeau (workout et stats), toujours aujourd'hui
    document.getElementById('hdr-label').textContent       = PROGRAM.meta.label;
    document.getElementById('hdr-date').textContent        = fmtDate(AUJOURD_HUI);
    document.getElementById('stats-hdr-date').textContent  = fmtDate(AUJOURD_HUI);

    // Premier rendu sur le jour courant
    render(JOUR_COURANT);
  </script>

  <!-- Chart.js via CDN (courbes de progression) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- ============================================================
       DASHBOARD — STATS
       Lit localStorage, calcule les métriques, pilote Chart.js.
       Dépend de PROGRAM, AUJOURD_HUI, JOURS_ABBR, MOIS_ABBR
       définis dans le bloc principal.
  ============================================================ -->
  <script>
    /* ── Navigation entre écrans ─────────────────────────────────── */

    function showScreen(name) {
      document.getElementById('screen-workout').style.display = name === 'workout' ? '' : 'none';
      document.getElementById('screen-stats').style.display   = name === 'stats'   ? '' : 'none';
      document.getElementById('nav-workout').classList.toggle('is-active', name === 'workout');
      document.getElementById('nav-stats').classList.toggle('is-active',   name === 'stats');
      window.scrollTo(0, 0); // remet le scroll en haut à chaque changement d'écran
      if (name === 'stats') renderDashboard();
    }

    function switchStatsView(view) {
      document.querySelectorAll('.stats-tab').forEach(t =>
        t.classList.toggle('is-active', t.dataset.view === view)
      );
      document.getElementById('view-summary').style.display  = view === 'summary'  ? '' : 'none';
      document.getElementById('view-exercise').style.display = view === 'exercise' ? '' : 'none';
    }

    /* ── Lecture des logs ────────────────────────────────────────── */

    function getAllLogs() {
      const logs = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key || !key.startsWith('log:')) continue;
        try {
          const entry = JSON.parse(localStorage.getItem(key));
          if (entry?.date) logs.push(entry);
        } catch (_) {}
      }
      return logs.sort((a, b) => a.date.localeCompare(b.date));
    }

    /* ── Streak (séances prévues au planning et complétées) ──────── */
    // Ne casse pas le streak sur les jours sans séance programmée.

    function getStreak() {
      const logMap = {};
      getAllLogs().forEach(l => { if (l.completed) logMap[l.date] = true; });

      let streak = 0;
      const d = new Date(AUJOURD_HUI);

      for (let daysBack = 0; daysBack < 365; daysBack++) {
        const dayIdx  = d.getDay();
        const dateStr = d.toISOString().slice(0, 10);
        const scheduled = PROGRAM.schedule[dayIdx] != null;

        if (scheduled) {
          if (logMap[dateStr]) {
            streak++;
          } else if (daysBack === 0) {
            // Séance d'aujourd'hui pas encore terminée — ne casse pas le streak
          } else {
            break; // Séance prévue manquée
          }
        }

        d.setDate(d.getDate() - 1);
      }
      return streak;
    }

    /* ── Volume hebdomadaire ─────────────────────────────────────── */
    // weekOffset 0 = semaine en cours, 1 = semaine précédente.

    function getWeekVolume(weekOffset) {
      const ref = new Date(AUJOURD_HUI);
      const dow  = ref.getDay() === 0 ? 7 : ref.getDay(); // 1=lun…7=dim
      ref.setDate(ref.getDate() - (dow - 1) - weekOffset * 7);
      const mondayStr = ref.toISOString().slice(0, 10);
      ref.setDate(ref.getDate() + 6);
      const sundayStr = ref.toISOString().slice(0, 10);

      let vol = 0;
      getAllLogs().forEach(log => {
        if (log.date < mondayStr || log.date > sundayStr) return;
        (log.exercises || []).forEach(ex => {
          if (ex.reps && ex.weight && ex.sets) vol += ex.sets * ex.reps * ex.weight;
        });
      });
      return Math.round(vol);
    }

    /* ── Dernière séance (complète ou partielle) ────────────────── */

    function getLastSession() {
      const logs = getAllLogs();
      return logs.length ? logs[logs.length - 1] : null;
    }

    /* ── Historique par exercice ─────────────────────────────────── */

    function getExerciseHistory(exId) {
      const history = [];
      getAllLogs().forEach(log => {
        const ex = (log.exercises || []).find(e => e.id === exId);
        if (ex && ex.weight > 0) history.push({ date: log.date, ...ex });
      });
      return history; // trié par date croissante (getAllLogs est trié)
    }

    // Retourne { id → nom } pour tous les exercices présents dans les logs
    function getAllLoggedExercises() {
      const map = {};
      // Noms canoniques depuis PROGRAM (prioritaires)
      Object.values(PROGRAM.sessions).forEach(s =>
        (s.exercises || []).forEach(e => { map[e.id] = e.name; })
      );
      // Fallback pour les exercices supprimés du programme
      getAllLogs().forEach(log =>
        (log.exercises || []).forEach(ex => { if (!map[ex.id]) map[ex.id] = ex.id; })
      );
      return map;
    }

    /* ── Formatage ───────────────────────────────────────────────── */

    function fmtVolume(v) {
      if (v === 0) return '0 kg';
      if (v >= 10000) return (v / 1000).toFixed(1) + ' t';
      return v.toLocaleString('fr-FR') + ' kg';
    }

    // Convertit "2026-06-02" → "LUN 2 JUN"
    function fmtDateStr(dateStr) {
      const d = new Date(dateStr + 'T12:00:00'); // T12 évite les décalages UTC
      return `${JOURS_ABBR[d.getDay()]} ${d.getDate()} ${MOIS_ABBR[d.getMonth()]}`;
    }

    /* ── Fréquence mensuelle ─────────────────────────────────────── */

    function fmtMonth(d) {
      return `${MOIS_ABBR[d.getMonth()]} ${String(d.getFullYear()).slice(2)}`;
    }

    // Retourne les N derniers mois avec le nombre de séances (toutes, pas seulement complètes)
    function getMonthlyFrequency(nbMois = 6) {
      const counts = {};
      getAllLogs().forEach(log => {
        const key = log.date.slice(0, 7); // "2026-05"
        counts[key] = (counts[key] || 0) + 1;
      });

      const months = [];
      for (let i = nbMois - 1; i >= 0; i--) {
        const d   = new Date(AUJOURD_HUI.getFullYear(), AUJOURD_HUI.getMonth() - i, 1);
        const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        months.push({ key, count: counts[key] || 0, label: fmtMonth(d) });
      }
      return months;
    }

    let monthlyChart = null;

    function renderMonthlyChart() {
      if (typeof Chart === 'undefined') return;
      if (monthlyChart) { monthlyChart.destroy(); monthlyChart = null; }

      // Recrée le canvas (Chart.js exige un canvas neuf après destroy)
      const wrap = document.getElementById('monthly-chart-wrap');
      const old  = wrap.querySelector('canvas');
      if (old) old.remove();
      const canvas = document.createElement('canvas');
      canvas.id = 'chart-monthly';
      wrap.appendChild(canvas);

      const months  = getMonthlyFrequency();
      const curKey  = `${AUJOURD_HUI.getFullYear()}-${String(AUJOURD_HUI.getMonth() + 1).padStart(2, '0')}`;

      monthlyChart = new Chart(canvas.getContext('2d'), {
        type: 'bar',
        data: {
          labels: months.map(m => m.label),
          datasets: [{
            data: months.map(m => m.count),
            backgroundColor: months.map(m =>
              m.key === curKey ? 'rgba(212,162,60,0.9)' : 'rgba(212,162,60,0.3)'
            ),
            borderColor: '#d4a23c',
            borderWidth: 1,
            borderRadius: 6,
            borderSkipped: false,
          }],
        },
        options: {
          responsive: true,
          animation: { duration: 300 },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1e1e1e',
              titleColor: '#8a8a8a',
              bodyColor: '#f5f5f5',
              borderColor: '#2a2a2a',
              borderWidth: 1,
              callbacks: {
                label: ctx => `${ctx.raw} séance${ctx.raw !== 1 ? 's' : ''}`,
              },
            },
          },
          scales: {
            x: {
              ticks:  { color: '#8a8a8a', font: { size: 11 } },
              grid:   { display: false },
              border: { display: false },
            },
            y: {
              ticks: {
                color: '#8a8a8a',
                font:  { size: 11 },
                stepSize: 1,
                callback: v => Number.isInteger(v) ? v : '',
              },
              grid:   { color: '#1e1e1e' },
              border: { display: false },
              beginAtZero: true,
            },
          },
        },
      });
    }

    /* ── Rendu du dashboard ──────────────────────────────────────── */

    function renderDashboard() {
      const streak  = getStreak();
      const curVol  = getWeekVolume(0);
      const prevVol = getWeekVolume(1);
      const last    = getLastSession();

      // Streak
      document.getElementById('stat-streak').textContent =
        streak > 0 ? `${streak} 🔥` : '0';
      document.getElementById('stat-streak-sub').textContent =
        streak <= 1 ? 'séance consécutive' : 'séances consécutives';

      // Volume semaine
      document.getElementById('stat-vol-week').textContent = fmtVolume(curVol);
      let vsText = '';
      if (prevVol === 0 && curVol > 0) {
        vsText = 'Première semaine tracée';
      } else if (prevVol > 0) {
        const pct = Math.round((curVol - prevVol) / prevVol * 100);
        vsText = (pct >= 0 ? `+${pct}` : `${pct}`) + ' % vs semaine préc.';
      }
      document.getElementById('stat-vol-vs').textContent = vsText;

      // Dernière séance
      if (last) {
        const s = PROGRAM.sessions[last.session];
        document.getElementById('stat-last-name').textContent = s ? s.name : last.session;
        document.getElementById('stat-last-date').textContent = fmtDateStr(last.date);
      } else {
        document.getElementById('stat-last-name').textContent = '—';
        document.getElementById('stat-last-date').textContent = 'Aucune séance enregistrée';
      }

      // Sélecteur exercice (conserve la sélection courante si possible)
      populateExerciseSelect();

      // Graphe fréquence mensuelle
      renderMonthlyChart();
    }

    function populateExerciseSelect() {
      const sel   = document.getElementById('exercise-select');
      const prev  = sel.value;
      const exMap = getAllLoggedExercises();

      sel.innerHTML = '<option value="">— Choisir un exercice —</option>';
      Object.entries(exMap).sort((a, b) => a[1].localeCompare(b[1])).forEach(([id, name]) => {
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = name;
        sel.appendChild(opt);
      });

      if (prev && exMap[prev]) { sel.value = prev; onExerciseSelect(prev); }
    }

    /* ── Vue par exercice ────────────────────────────────────────── */

    let weightChart = null;

    function onExerciseSelect(exId) {
      const historyList = document.getElementById('history-list');
      const prCard      = document.getElementById('pr-card');
      const chartWrap   = document.getElementById('chart-wrap');
      const noHistory   = document.getElementById('no-history');

      historyList.innerHTML   = '';
      prCard.style.display    = 'none';
      chartWrap.style.display = 'none';
      noHistory.style.display = 'none';

      if (!exId) return;

      const history = getExerciseHistory(exId);
      if (!history.length) { noHistory.style.display = ''; return; }

      // Record personnel
      const pr     = Math.max(...history.map(h => h.weight));
      const prEntry = [...history].reverse().find(h => h.weight === pr);
      document.getElementById('stat-pr').textContent      = `${pr} ${PROGRAM.meta.units}`;
      document.getElementById('stat-pr-date').textContent = prEntry ? fmtDateStr(prEntry.date) : '';
      prCard.style.display = '';

      // Chart
      chartWrap.style.display = '';
      renderWeightChart(history, pr);

      // Historique texte (8 dernières entrées, plus récent en premier)
      [...history].reverse().slice(0, 8).forEach(h => {
        const vol  = (h.reps && h.sets && h.weight) ? h.sets * h.reps * h.weight : null;
        const item = document.createElement('div');
        item.className = 'history-item' + (h.weight === pr ? ' is-pr' : '');
        item.innerHTML =
          `<span class="history-date">${fmtDateStr(h.date)}</span>` +
          `<span class="history-weight">${h.weight} ${PROGRAM.meta.units}` +
          (h.weight === pr ? ' 🏆' : '') + `</span>` +
          (vol ? `<span class="history-vol">${vol.toLocaleString('fr-FR')} kg vol.</span>` : '');
        historyList.appendChild(item);
      });
    }

    function renderWeightChart(history, pr) {
      if (typeof Chart === 'undefined') return;
      if (weightChart) { weightChart.destroy(); weightChart = null; }

      // Recrée le canvas (Chart.js exige un canvas neuf après destroy)
      const wrap = document.getElementById('chart-wrap');
      wrap.innerHTML = '<canvas id="chart-weight"></canvas>';
      const ctx = document.getElementById('chart-weight').getContext('2d');

      const labels  = history.map(h => fmtDateStr(h.date));
      const weights = history.map(h => h.weight);

      weightChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: weights,
            borderColor: '#d4a23c',
            backgroundColor: 'rgba(212,162,60,0.07)',
            pointBackgroundColor: weights.map(w => w === pr ? '#d4a23c' : '#555'),
            pointBorderColor:     weights.map(w => w === pr ? '#d4a23c' : '#555'),
            pointRadius:          weights.map(w => w === pr ? 8 : 4),
            pointHoverRadius: 8,
            tension: 0.35,
            fill: true,
            borderWidth: 2,
          }],
        },
        options: {
          responsive: true,
          animation: { duration: 300 },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1e1e1e',
              titleColor: '#8a8a8a',
              bodyColor: '#f5f5f5',
              borderColor: '#2a2a2a',
              borderWidth: 1,
              callbacks: { label: ctx => `${ctx.raw} ${PROGRAM.meta.units}` },
            },
          },
          scales: {
            x: {
              ticks: { color: '#8a8a8a', font: { size: 10 }, maxRotation: 35 },
              grid:  { color: '#1e1e1e' },
            },
            y: {
              ticks: {
                color: '#8a8a8a',
                font:  { size: 10 },
                callback: v => `${v} ${PROGRAM.meta.units}`,
              },
              grid: { color: '#1e1e1e' },
              beginAtZero: false,
            },
          },
        },
      });
    }

    /* ── Export / Import ─────────────────────────────────────────── */

    function exportData() {
      const logs = getAllLogs();
      const blob = new Blob(
        [JSON.stringify({ exportedAt: new Date().toISOString(), version: 1, logs }, null, 2)],
        { type: 'application/json' }
      );
      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href     = url;
      a.download = `training-${AUJOURD_HUI.toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function importData(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const raw  = JSON.parse(e.target.result);
          const logs = raw.logs || (Array.isArray(raw) ? raw : []);
          let count  = 0;
          logs.forEach(log => {
            if (log?.date && log?.session) {
              localStorage.setItem(`log:${log.date}`, JSON.stringify(log));
              count++;
            }
          });
          document.getElementById('input-import').value = '';
          alert(`${count} séance${count > 1 ? 's' : ''} importée${count > 1 ? 's' : ''}.`);
          renderDashboard();
        } catch (_) {
          alert('Fichier invalide ou corrompu.');
        }
      };
      reader.readAsText(file);
    }

    /* ── Câblage des événements ──────────────────────────────────── */

    function clearHistory() {
      if (!confirm('Effacer tout l\'historique d\'entraînement ?\nCette action est irréversible.')) return;
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('log:')) keys.push(k);
      }
      keys.forEach(k => localStorage.removeItem(k));
      renderDashboard();
    }

    document.getElementById('nav-workout').addEventListener('click', () => showScreen('workout'));
    document.getElementById('nav-stats').addEventListener('click',   () => showScreen('stats'));
    document.getElementById('btn-export').addEventListener('click',  exportData);
    document.getElementById('input-import').addEventListener('change', e => importData(e.target.files[0]));
    document.getElementById('btn-clear-history').addEventListener('click', clearHistory);
    document.querySelectorAll('.stats-tab').forEach(btn =>
      btn.addEventListener('click', () => switchStatsView(btn.dataset.view))
    );
    document.getElementById('exercise-select').addEventListener('change', e =>
      onExerciseSelect(e.target.value)
    );
  </script>

  <!-- Enregistrement du service worker (hors-ligne) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    }
  </script>

</body>
